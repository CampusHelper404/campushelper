<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Become a student helper on Campus Helper - Share your knowledge, respond to requests, and assist fellow students.">
  <title>Become a Helper - Campus Helper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo" id="logo">
        <span class="logo-campus">Campus</span> <span class="logo-helper">Helper</span>
      </a>
    </div>
  </nav>

  <main>
    <section class="onboarding2" id="onboarding2-section">
      <div class="ob2-container">

        <!-- Header -->
        <div class="ob2-header" id="ob2-header">
          <h1 class="ob2-title" id="ob2-title">Want to help others and share your Knowledge</h1>
          <p class="ob2-subtitle" id="ob2-subtitle">
            Join Campus Helper as a student helper. Respond to requests, chat with students, and
            assist them in their academic journey.
          </p>
        </div>

        <!-- Content: Illustration + Steps Panel -->
        <div class="ob2-content" id="ob2-content">

          <!-- Left: Large Illustration -->
          <div class="ob2-illustration" id="ob2-illustration">
            <img src="onboarding2.svg" alt="Student helper working at a desk with educational tools">
          </div>

          <!-- Right: Steps Panel -->
          <div class="ob2-panel" id="ob2-panel">

            <!-- Panel Header with icon -->
            <div class="ob2-panel-header" id="ob2-panel-header">
              <div class="ob2-panel-icon">
                <img src="become a student helper.svg" alt="Become a student helper icon">
              </div>
              <h2 class="ob2-panel-title">Become a student Helper</h2>
            </div>

            <!-- Steps List -->
            <div class="ob2-steps-list" id="ob2-steps-list">
              <div class="ob2-step" id="ob2-step-1">
                <span class="ob2-step-number">1</span>
                <span class="ob2-step-text">Create your profile</span>
              </div>
              <div class="ob2-step" id="ob2-step-2">
                <span class="ob2-step-number">2</span>
                <span class="ob2-step-text">Set your availability</span>
              </div>
              <div class="ob2-step" id="ob2-step-3">
                <span class="ob2-step-number">3</span>
                <span class="ob2-step-text">Respond to Student requests</span>
              </div>
            </div>

          </div>
        </div>

        <div class="onboarding-actions" id="ob2-actions">
          <a href="onboarding3.html" class="onboarding-next-btn" id="ob2-next-btn">Next</a>
        </div>

      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>

</html>
