<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to Campus Helper - Access your academic consulting platform account.">
  <title>Login - Campus Helper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo" id="logo">
        <span class="logo-campus">Campus</span> <span class="logo-helper">Helper</span>
      </a>
    </div>
  </nav>

  <main>
    <section class="login-section" id="login-section">
      <div class="login-container">

        <!-- Left: Login Form -->
        <div class="login-form-panel" id="login-form-panel">
          <h1 class="login-title" id="login-title">Login Now</h1>
          <p class="login-welcome" id="login-welcome">Hi, Welcome Back</p>

          <!-- Error message -->
          <div id="login-error" style="display:none; color:#c0392b; background:#fdecea; border-radius:6px; padding:0.6rem 1rem; margin-bottom:1rem; font-size:0.9rem;"></div>

          <form class="login-form" id="login-form" onsubmit="return false;">
            <!-- Email -->
            <div class="form-group" id="form-group-email">
              <label for="login-email" class="form-label">Email</label>
              <input type="email" id="login-email" class="form-input" placeholder="" autocomplete="email">
            </div>

            <!-- Password -->
            <div class="form-group" id="form-group-password">
              <label for="login-password" class="form-label">Password</label>
              <div class="password-wrapper">
                <input type="password" id="login-password" class="form-input" placeholder=""
                  autocomplete="current-password">
                <button type="button" class="password-toggle" id="password-toggle"
                  aria-label="Toggle password visibility">
                  <svg class="eye-icon" id="eye-icon-off" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
                    <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                  </svg>
                  <svg class="eye-icon" id="eye-icon-on" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" style="display:none;">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
            </div>

            <!-- Remember Me & Forgot Password -->
            <div class="form-options" id="form-options">
              <label class="remember-me" id="remember-me-label">
                <input type="checkbox" id="remember-me-checkbox">
                <span class="remember-text">Remember Me</span>
              </label>
              <a href="#" class="forgot-password" id="forgot-password-link">Forgot Password</a>
            </div>

            <!-- Login Button -->
            <button type="submit" class="login-btn" id="login-btn">Login</button>

            <!-- Sign Up Link -->
            <p class="signup-prompt" id="signup-prompt">
              Don't have an account? <a href="signup.html" class="signup-link" id="signup-link">Sign Up</a>
            </p>
          </form>
        </div>

        <!-- Right: Illustration -->
        <div class="login-illustration" id="login-illustration">
          <img src="login.svg" alt="Person standing next to a mobile phone login screen">
        </div>

      </div>
    </section>
  </main>

  <!-- Load shared API client first -->
  <script src="api.js"></script>
  <script>
    // ── Password toggle ──────────────────────────────────────
    const passwordToggle = document.getElementById('password-toggle');
    const passwordInput  = document.getElementById('login-password');
    const eyeOff = document.getElementById('eye-icon-off');
    const eyeOn  = document.getElementById('eye-icon-on');

    if (passwordToggle) {
      passwordToggle.addEventListener('click', () => {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        eyeOff.style.display = isPassword ? 'none'  : 'block';
        eyeOn.style.display  = isPassword ? 'block' : 'none';
      });
    }

    // ── Login form submit ────────────────────────────────────
    const loginForm  = document.getElementById('login-form');
    const loginBtn   = document.getElementById('login-btn');
    const errorBox   = document.getElementById('login-error');

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
    }

    function hideError() {
      errorBox.style.display = 'none';
    }

    loginForm.addEventListener('submit', async () => {
      hideError();

      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      loginBtn.textContent = 'Logging in…';
      loginBtn.disabled = true;

      try {
        const { user } = await api.login(email, password);

        // Redirect based on role
        if (user.role === 'admin') {
          window.location.href = 'consultant-dashboard.html';
        } else if (user.role === 'helper' || user.role === 'both') {
          window.location.href = 'consultant-dashboard.html';
        } else {
          // student
          window.location.href = 'consultant-dashboard.html';
        }
      } catch (err) {
        showError(err.message || 'Login failed. Please try again.');
        loginBtn.textContent = 'Login';
        loginBtn.disabled = false;
      }
    });
  </script>
</body>

</html>
