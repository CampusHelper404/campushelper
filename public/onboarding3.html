<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Get started with Campus Helper - Join today and connect with the academic support you need to succeed.">
  <title>Get Started - Campus Helper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo" id="logo">
        <span class="logo-campus">Campus</span> <span class="logo-helper">Helper</span>
      </a>
    </div>
  </nav>

  <main>
    <section class="onboarding3" id="onboarding3-section">
      <div class="ob3-container">

        <div class="ob3-card" id="ob3-card">
          <!-- Header -->
          <div class="ob3-header" id="ob3-header">
            <h1 class="ob3-title" id="ob3-title">Ready to Get Started?</h1>
            <p class="ob3-subtitle" id="ob3-subtitle">
              Join Campus Helper today and connect with the support you need to succeed
            </p>
          </div>

          <!-- Illustrations -->
          <div class="ob3-illustrations" id="ob3-illustrations">
            <div class="ob3-image" id="ob3-image-1">
              <img src="onboarding3i.svg" alt="Business professionals shaking hands illustration">
            </div>
            <div class="ob3-image" id="ob3-image-2">
              <img src="onboarding3ii.svg" alt="Team of students together illustration">
            </div>
          </div>

          <!-- CTA Button -->
          <div class="ob3-actions" id="ob3-actions">
            <a href="consultant-dashboard.html" class="onboarding-next-btn" id="ob3-get-started-btn">Get Started</a>
          </div>
        </div>

      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>

</html>
