<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Campus Helper">
  <title>Campus Helper - Academic Consulting Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="#" class="logo" id="logo">
        <span class="logo-campus">Campus</span> <span class="logo-helper">Helper</span>
      </a>
      <ul class="nav-links" id="nav-links">
        <li><a href="about.html" class="nav-link" id="nav-about">About Us</a></li>
        <li><a href="#faq" class="nav-link" id="nav-faq">FAQ</a></li>
        <li><a href="/auth/sign-in" class="nav-link" id="nav-login">Login</a></li>
      </ul>
      <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle navigation menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- Hero Section -->
  <main>
    <section class="hero" id="hero-section">
      <div class="hero-container">
        <div class="hero-content" id="hero-content">
          <div class="trust-badge" id="trust-badge">
            <span class="badge-dot"></span>
            Trusted by 1000+ students
          </div>

          <h1 class="hero-title" id="hero-title">Campus Helper</h1>

          <p class="hero-subtitle about-reveal" id="hero-subtitle">
            Connect with academic consultants and get the help you need for your courses
          </p>

          <div class="stats about-reveal" id="stats-section">
            <div class="stat-item" id="stat-students">
              <span class="stat-number">1000+</span>
              <span class="stat-label">Students</span>
            </div>
            <div class="stat-item" id="stat-consultants">
              <span class="stat-number">500+</span>
              <span class="stat-label">Consultants</span>
            </div>
            <div class="stat-item" id="stat-success">
              <span class="stat-number">95%</span>
              <span class="stat-label">Success Rate</span>
            </div>
          </div>

          <a href="/auth/sign-up" class="cta-button" id="cta-button">
            Get Started free
          </a>
        </div>

        <div class="hero-images" id="hero-images">
          <div class="image-card image-card-top" id="image-card-top">
            <img src="online-learning.svg" alt="Student learning online with academic resources and grading tools"
              id="img-online-learning" loading="eager">
          </div>
          <div class="image-card image-card-bottom" id="image-card-bottom">
            <img src="consultant.svg" alt="Academic consultant presenting educational material on a whiteboard"
              id="img-consultant" loading="eager">
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>

</html>
